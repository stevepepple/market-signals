name: Refresh Market Data

on:
  schedule:
    - cron: "0 6 * * *"  # Daily at 6 AM UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    outputs:
      data_changed: ${{ steps.commit.outputs.data_changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch fresh market data
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          PLAID_CLIENT_ID: ${{ secrets.PLAID_CLIENT_ID }}
          PLAID_SECRET: ${{ secrets.PLAID_SECRET }}
          PLAID_ACCESS_TOKEN_ROBINHOOD: ${{ secrets.PLAID_ACCESS_TOKEN_ROBINHOOD }}
          PLAID_ACCESS_TOKEN_WEALTHFRONT: ${{ secrets.PLAID_ACCESS_TOKEN_WEALTHFRONT }}
        run: npm run fetch-data

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/markets.json public/data/insider-trades.json public/data/economic.json public/data/calendar.json public/data/sentiment.json public/data/news.json public/data/valuation.json public/data/portfolio.json
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit."
            echo "data_changed=false" >> "$GITHUB_OUTPUT"
          else
            git stash
            git pull --rebase origin main
            git stash pop
            git add public/data/markets.json public/data/insider-trades.json public/data/economic.json public/data/calendar.json public/data/sentiment.json public/data/news.json public/data/valuation.json public/data/portfolio.json
            git commit -m "chore: refresh market data $(date -u +%Y-%m-%d)"
            git push
            echo "data_changed=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    runs-on: ubuntu-latest
    needs: fetch
    if: needs.fetch.outputs.data_changed == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
